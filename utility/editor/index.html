<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Zephyr3d Editor</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
        touch-action: none;
        overscroll-behavior: contain;
        overflow: hidden;
        outline: none;
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
      }
      canvas:focus {
        outline: none;
      }
    </style>
    <script type="importmap">
__ZEPHYR3D_IMPORT_MAP__
    </script>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <script src="/vendor/typescript.js"></script>
    <script src="/vendor/draco_decoder.js"></script>
    <script type="module" src="/src/monaco-init.ts"></script>
    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
